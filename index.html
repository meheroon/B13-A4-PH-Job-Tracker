<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <title>Job Application Tracker</title>
</head>
<body class="bg-base-200 min-h-screen">
  <header class="bg-base-100 border-b">
    <div class="max-w-6xl mx-auto px-4 py-5 flex items-center justify-between">
      <h1 class="text-xl md:text-2xl font-bold">Job Application Tracker</h1>
      <span class="badge badge-outline">Batch 13</span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6 space-y-6">

    
    <section id="dashboard" class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div class="bg-base-100 rounded-xl border border-base-300">
        <div class="p-4">
          <p class="text-xs font-medium opacity-70">Total</p>
          <p id="countTotal" class="text-2xl font-bold mt-1">0</p>
        </div>
      </div>

      <div class="bg-base-100 rounded-xl border border-base-300">
        <div class="p-4">
          <p class="text-xs font-medium opacity-70">Interview</p>
          <p id="countInterview" class="text-2xl font-bold mt-1 text-success">0</p>
        </div>
      </div>

      <div class="bg-base-100 rounded-xl border border-base-300">
        <div class="p-4">
          <p class="text-xs font-medium opacity-70">Rejected</p>
          <p id="countRejected" class="text-2xl font-bold mt-1 text-error">0</p>
        </div>
      </div>
    </section>

    
    <section class="bg-base-100 rounded-2xl border border-base-300">
      <div class="p-4 md:p-6">
        <div class="flex items-center justify-between">
          <h2 class="text-sm font-semibold text-primary">Available Jobs</h2>
          <span id="tabCount" class="text-xs font-medium opacity-70">0 jobs</span>
        </div>

       
        <div class="mt-3">
          <div class="tabs tabs-boxed bg-base-200 inline-flex rounded-lg p-1">
            <a id="tabAll" class="tab tab-active text-xs" data-tab="all">All</a>
            <a id="tabInterview" class="tab text-xs" data-tab="interview">Interview</a>
            <a id="tabRejected" class="tab text-xs" data-tab="rejected">Rejected</a>
          </div>
        </div>

        <div class="mt-4 border-t border-base-300"></div>

        
        <div class="mt-4">
          <div id="jobsGrid" class="space-y-4"></div>

       
          <div id="emptyState" class="hidden text-center py-14">
            <img id="emptyImg" src="./assets/jobs.png" alt="No jobs" class="w-16 mx-auto mb-4 opacity-70">
            <h3 class="text-base font-bold">No jobs available</h3>
            <p class="text-xs opacity-70 mt-2">
              Check back soon for new job opportunities.
            </p>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script src="./app.js"></script>
</body>
</html>
